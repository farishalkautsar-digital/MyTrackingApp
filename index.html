    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; transition: background 0.3s, border-top 0.3s; }
    .nav-item { text-align: center; color: #adb5bd; cursor: pointer; font-size: 0.75rem; font-weight: 600; flex: 1; transition: color 0.2s; }
    .nav-item i { font-size: 1.5rem; display: block; }
    .nav-item.active { color: var(--primary-green); }

    .list-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.03); cursor: pointer; border: 1px solid #f8f9fa; transition: background 0.3s, border 0.3s; }
    .nomor-badge { background: var(--primary-green); color: white; min-width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 15px; }
    .page-btn { width: 55px; height: 55px; border-radius: 12px; border: 2px solid #e9ecef; background: white; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .page-btn.done { background: var(--primary-green); color: white; border-color: var(--primary-green); box-shadow: 0 4px 8px rgba(25, 135, 84, 0.3); }

    #fullScreenNote { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #f8f9fa; z-index: 2000; display: none; flex-direction: column; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    .view-section { display: none; padding: 20px; }
    .view-section.active { display: block; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #dee2e6; border-radius: 10px; }
    
    .credit-text { font-size: 0.65rem; color: #adb5bd; text-align: center; margin-top: 20px; letter-spacing: 0.5px; }

<div id="authContainer" class="auth-screen">

    <form id="loginForm" onsubmit="window.handleLogin(event)">
      <input type="email" id="emailIn" class="form-control mb-2" placeholder="Email" required>
      <input type="password" id="passIn" class="form-control mb-3" placeholder="Password" required>
      <button type="submit" id="btnLogin" class="btn btn-success w-100 fw-bold mb-3">Masuk</button>
      <p class="text-center small">Belum punya akun? <a href="#" onclick="window.toggleAuth(true)">Daftar Gratis</a></p>
    </form>
    <form id="registerForm" onsubmit="window.handleRegister(event)" style="display: none;">
      <input type="text" id="nameReg" class="form-control mb-2" placeholder="Nama Lengkap" required>
      <input type="email" id="emailReg" class="form-control mb-2" placeholder="Email Baru" required>
      <input type="password" id="passReg" class="form-control mb-3" placeholder="Password (min 6 karakter)" minlength="6" required>
      <button type="submit" id="btnReg" class="btn btn-primary w-100 fw-bold mb-3">Buat Akun</button>
      <p class="text-center small">Sudah punya akun? <a href="#" onclick="window.toggleAuth(false)">Login</a></p>
    </form>
  </div>
  <div class="credit-text">&copy; 2026 | Designed & Engineered by Farish Alkautsar</div>
</div>

  <div id="view-search" class="view-section">

    </div>
    <div id="searchResults"></div>
  </div>

  <div id="view-manage" class="view-section">

    </div>
    <div class="glass-card p-3 mb-4 border-start border-4 border-warning">
        <h6 class="fw-bold text-warning mb-3">Bulk Insert</h6>
        <textarea id="bulkData" class="form-control mb-3" rows="3" placeholder="Nama, Topik, Total"></textarea>

    </div>
    <div id="manageList"></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="window.switchView('dashboard', this)"><i class="bi bi-house-door"></i>Home</div>
    <div class="nav-item" onclick="window.switchView('tracker', this)"><i class="bi bi-card-checklist"></i>Track</div>
    <div class="nav-item" onclick="window.switchView('search', this)"><i class="bi bi-search"></i>Cari</div>
    <div class="nav-item" id="navManage" onclick="window.switchView('manage', this)"><i class="bi bi-gear"></i>Kelola</div>
  </div>
</div>

<div id="fullScreenNote">

        <span id="noteHeader" class="fw-bold">Halaman X</span>
        <button class="btn btn-sm btn-warning fw-bold" onclick="window.saveNote()">Simpan</button>
    </div>
    <div class="p-3 flex-grow-1 overflow-auto">

    </div>
</div>

    const name = document.getElementById('nameReg').value;
    const email = document.getElementById('emailReg').value;
    const pass = document.getElementById('passReg').value;
    btn.innerHTML = 'Memproses...'; btn.disabled = true;

  });

  function initDataListener() {
    const qLogs = query(collection(db, "log_progres"), where("uid", "==", currentUser.uid));
    onSnapshot(qLogs, (snap) => {
      userLogs = snap.docs.map(d => ({id: d.id, ...d.data()}));
      renderDashboard();
      if(activeGrid) renderGrid();
    });

    const qHimp = query(collection(db, "master_himpunan"), orderBy("createdAt", "asc"));
    onSnapshot(qHimp, (snap) => {
      userHimpunan = snap.docs.map(d => ({id: d.id, ...d.data()}));
      renderMasterList();
      renderManageList();
      renderDashboard(); 
    });
  }

  window.switchView = (viewId, el) => {
    document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('view-' + viewId).classList.add('active');
    el.classList.add('active');
    document.getElementById('searchInput').value = ''; 
    if(viewId === 'search') window.performSearch(); 
    if(viewId === 'tracker') { window.closeGrid(); renderMasterList(); }
  };

  window.changeCetakan = (val) => {
    currentCetakan = val;
    localStorage.setItem('cetakanQuran', val);
    renderMasterList(); renderDashboard(); 
  };

  window.switchKategori = (kat) => {
    currentKategori = kat;
    document.getElementById('btnKatQuran').className = kat === 'Quran' ? 'btn btn-success active' : 'btn btn-light';
    document.getElementById('btnKatHimpunan').className = kat === 'Himpunan' ? 'btn btn-success active' : 'btn btn-light';
    const qOpt = document.getElementById('quranOptions');
    if (kat === 'Quran') { qOpt.classList.add('d-flex'); qOpt.classList.remove('d-none'); } 
    else { qOpt.classList.remove('d-flex'); qOpt.classList.add('d-none'); }
    document.getElementById('selectCetakan').value = currentCetakan;
    renderMasterList();
  };

  function renderMasterList() {
    const list = document.getElementById('masterList');
    list.innerHTML = '';
    if (currentKategori === 'Quran') {
      quranDb.forEach(q => {
        let s = q.start; let e = q.end;
        if (currentCetakan === '605') { s += 1; e += 1; }
        const card = document.createElement('div');
        card.className = 'list-card';
        card.innerHTML = `<div class="nomor-badge">${q.no}</div><div><div class="fw-bold text-dark">${q.nama}</div><div class="small text-muted">Halaman ${s} - ${e}</div></div>`;
        card.onclick = () => window.openGrid({ nama: q.nama, start: s, end: e, total: (e - s + 1) });
        list.appendChild(card);
      });
    } else {
      userHimpunan.forEach((h, index) => {
        const card = document.createElement('div');
        card.className = 'list-card';
        card.innerHTML = `<div class="nomor-badge">${index + 1}</div><div><div class="fw-bold text-dark">${h.nama}</div><div class="small text-muted">${h.topik} • ${h.total} Hal</div></div>`;
        card.onclick = () => window.openGrid(h);
        list.appendChild(card);
      });
    }
  }

  window.openGrid = (item) => {
    activeGrid = item;
    document.getElementById('masterList').style.display = 'none';
    document.getElementById('detailGrid').style.display = 'block';
    document.getElementById('gridTitle').innerText = item.nama;
    renderGrid();
  };

  window.closeGrid = () => { activeGrid = null; document.getElementById('masterList').style.display = 'block'; document.getElementById('detailGrid').style.display = 'none'; };

  function renderGrid() {
    const container = document.getElementById('gridContainer');
    container.innerHTML = '';
    const start = currentKategori === 'Quran' ? activeGrid.start : 1;
    const end = currentKategori === 'Quran' ? activeGrid.end : activeGrid.total;
    for (let i = start; i <= end; i++) {
      let checkHal = i; 
      if (currentKategori === 'Quran' && currentCetakan === '605') checkHal = i - 1;
      const log = userLogs.find(l => l.kat === currentKategori && l.judul === activeGrid.nama && l.hal == checkHal);
      const btn = document.createElement('div');
      btn.className = `page-btn ${log ? 'done' : ''}`;
      btn.innerText = i; 
      btn.onclick = () => window.openNote(i, checkHal, log); 
      container.appendChild(btn);
    }
  }

  window.openNote = (uiHal, stdHal, log) => {
    activePage = { ui: uiHal, std: stdHal, logId: log ? log.id : null };
    document.getElementById('noteHeader').innerText = `Hal ${uiHal}`;
    document.getElementById('notePenyampai').value = log?.penyampai || '';
    document.getElementById('noteTanggal').value = log?.tanggal || new Date().toISOString().split('T')[0];
    document.getElementById('noteLokasi').value = log?.lokasi || '';
    document.getElementById('noteCatatan').value = log?.catatan || '';
    document.getElementById('btnDeleteLog').style.display = log ? 'block' : 'none';
    document.getElementById('fullScreenNote').style.display = 'flex';
  };

  window.closeNote = () => document.getElementById('fullScreenNote').style.display = 'none';

  window.saveNote = async () => {
    const data = { uid: currentUser.uid, kat: currentKategori, judul: activeGrid.nama, hal: activePage.std, penyampai: document.getElementById('notePenyampai').value, tanggal: document.getElementById('noteTanggal').value, lokasi: document.getElementById('noteLokasi').value, catatan: document.getElementById('noteCatatan').value, updatedAt: new Date() };
    try {
      if(activePage.logId) await updateDoc(doc(db, "log_progres", activePage.logId), data);
      else await addDoc(collection(db, "log_progres"), data);
      window.closeNote();
    } catch (e) { alert(e.message); }
  };

  window.deleteNote = async () => { if(confirm("Hapus progres halaman ini?")) { await deleteDoc(doc(db, "log_progres", activePage.logId)); window.closeNote(); } };

  window.addHimpunan = async () => {
    const nama = document.getElementById('himpNama').value;
    const topik = document.getElementById('himpTopik').value;
    const total = document.getElementById('himpTotal').value;
    if(!nama || !total) return;
    await addDoc(collection(db, "master_himpunan"), { nama, topik, total: parseInt(total), createdAt: new Date() });
    document.getElementById('himpNama').value = ''; document.getElementById('himpTopik').value = ''; document.getElementById('himpTotal').value = '';
  };

  window.editHimpunan = async (id, oldNama, oldTopik, oldTotal) => {
    const { value: formValues } = await Swal.fire({
      title: 'Edit Himpunan',
      html: `<input id="swal-nama" class="form-control mb-2" placeholder="Nama" value="${oldNama}"><input id="swal-topik" class="form-control mb-2" placeholder="Topik" value="${oldTopik}"><input id="swal-total" type="number" class="form-control" placeholder="Total" value="${oldTotal}">`,
      focusConfirm: false, showCancelButton: true, confirmButtonText: 'Simpan',
      preConfirm: () => [document.getElementById('swal-nama').value, document.getElementById('swal-topik').value, document.getElementById('swal-total').value]
    });
    if (formValues) {
      const newNama = formValues[0].trim(); const newTopik = formValues[1].trim(); const newTotal = parseInt(formValues[2]) || 0;
      if (!newNama) return Swal.fire("Error", "Nama kosong", "error");
      try { await updateDoc(doc(db, "master_himpunan", id), { nama: newNama, topik: newTopik, total: newTotal }); } catch (e) { alert(e.message); }
    }
  };

  window.bulkInsertHimpunan = async () => {
    const text = document.getElementById('bulkData').value;
    if(!text) return;
    const lines = text.split('\n'); let count = 0;
    for(let line of lines) {
        const parts = line.split(',');
        if(parts[0] && parts[0].trim() !== '') {
            await addDoc(collection(db, "master_himpunan"), { nama: parts[0].trim(), topik: parts[1] ? parts[1].trim() : '', total: parts[2] ? parseInt(parts[2].trim()) || 0 : 0, createdAt: new Date() });
            count++;
        }
    }
    alert(`Sukses input ${count} Buku.`); document.getElementById('bulkData').value = '';
  };

  function renderDashboard() {
    const cont = document.getElementById('dashboardStats');
    cont.innerHTML = '';
    const uniqueDates = [...new Set(userLogs.filter(l => l.tanggal).map(l => l.tanggal))].sort().reverse();
    let streak = 0;
    const today = new Date();
    const tzOffset = today.getTimezoneOffset() * 60000;
    const todayStr = (new Date(today - tzOffset)).toISOString().split('T')[0];
    let yesterdayDate = new Date(today); yesterdayDate.setDate(yesterdayDate.getDate() - 1);
    const yesterdayStr = (new Date(yesterdayDate - tzOffset)).toISOString().split('T')[0];

    if (uniqueDates.includes(todayStr) || uniqueDates.includes(yesterdayStr)) {
        let cur = uniqueDates.includes(todayStr) ? new Date(todayStr) : new Date(yesterdayStr);
        for (let i = 0; i < uniqueDates.length; i++) {
            const dStr = (new Date(cur - (cur.getTimezoneOffset() * 60000))).toISOString().split('T')[0];
            if (uniqueDates.includes(dStr)) { streak++; cur.setDate(cur.getDate() - 1); } else break;
        }
    }

    let lastLog = null;
    if (userLogs.length > 0) {
        lastLog = [...userLogs].sort((a, b) => (b.updatedAt?.toMillis() || 0) - (a.updatedAt?.toMillis() || 0))[0];
    }

    let html = `
    <div class="row g-2 mb-4">
        <div class="col-5">
            <div class="glass-card p-3 text-center h-100 d-flex flex-column justify-content-center">
                <div style="font-size: 1.8rem;">🔥</div>
                <h3 class="fw-bold m-0 mt-1">${streak} <span class="small text-muted" style="font-size: 0.7rem;">Hari</span></h3>
                <small class="text-warning fw-bold" style="font-size: 0.6rem;">ISTIQOMAH</small>
            </div>
        </div>
        <div class="col-7">
            <div class="glass-card p-3 h-100 d-flex flex-column justify-content-center text-white" style="background: linear-gradient(135deg, #198754 0%, #20c997 100%); cursor: pointer;" id="btnQuickResume">
                ${lastLog ? `<small class="text-white-50 fw-bold mb-1" style="font-size: 0.6rem;">LANJUTKAN</small><div class="fw-bold text-truncate" style="font-size: 0.85rem;">${lastLog.judul}</div><div class="small" style="font-size: 0.7rem;">Hal ${lastLog.kat === 'Quran' && currentCetakan === '605' ? lastLog.hal + 1 : lastLog.hal} <i class="bi bi-arrow-right"></i></div>` : `<div class="fw-bold" style="font-size: 0.8rem;">Mulai Ngaji</div>`}
            </div>
        </div>
    </div>`;

    const maxHal = currentCetakan === '604' ? 604 : 605;
    const qDone = userLogs.filter(l => l.kat === 'Quran').length;
    let qPerc = Math.round((qDone / maxHal) * 100);
    html += `<h6 class="fw-bold text-success mb-2">Al-Qur'an</h6>
    <div class="glass-card p-3 mb-4 border-start border-4 border-success">
        <div class="d-flex justify-content-between small fw-bold mb-1"><span>Progres Khatam</span><span>${qPerc}%</span></div>
        <div class="progress rounded-pill mb-3" style="height: 8px;"><div class="progress-bar bg-success" style="width:${qPerc}%"></div></div>
        <details><summary class="small text-success fw-bold" style="outline:none;">Detail Surat</summary><div class="mt-2" style="max-height:150px; overflow-y:auto;">`;
    quranDb.forEach(q => {
        let total = (q.end - q.start) + 1; let done = userLogs.filter(l => l.kat === 'Quran' && l.judul === q.nama).length;
        let p = Math.round((done / total) * 100);
        html += `<div class="mb-1"><div class="d-flex justify-content-between" style="font-size:0.65rem;"><span>${q.nama}</span><span>${done}/${total}</span></div><div class="progress" style="height:3px;"><div class="progress-bar ${p===100?'bg-success':'bg-warning'}" style="width:${p}%"></div></div></div>`;
    });
    html += `</div></details></div>`;

    html += `<h6 class="fw-bold text-primary mb-2">Himpunan</h6><div class="row g-2 mb-4">`;
    userHimpunan.forEach(h => {
        let done = userLogs.filter(l => l.kat === 'Himpunan' && l.judul === h.nama).length;
        let p = h.total > 0 ? Math.round((done / h.total) * 100) : 0;
        html += `<div class="col-6"><div class="glass-card p-3 h-100 border-start border-4 border-primary">
            <div class="fw-bold text-truncate mb-1" style="font-size:0.75rem;">${h.nama}</div>
            <div class="progress mb-1" style="height:4px;"><div class="progress-bar" style="width:${p}%"></div></div>
            <div class="text-muted" style="font-size:0.6rem;">${done}/${h.total} Hal</div>
        </div></div>`;
    });
    html += `</div>`;
    cont.innerHTML = html;

    if (lastLog) {
        document.getElementById('btnQuickResume').onclick = () => {
            window.switchView('tracker', document.querySelectorAll('.nav-item')[1]);
            window.switchKategori(lastLog.kat);
            if (lastLog.kat === 'Quran') {
                const q = quranDb.find(x => x.nama === lastLog.judul);
                let s = q.start; let e = q.end; if (currentCetakan === '605') { s++; e++; }
                window.openGrid({ nama: q.nama, start: s, end: e, total: (e - s + 1) });
            } else { window.openGrid(userHimpunan.find(x => x.nama === lastLog.judul)); }
        };
    }
  }

  function renderManageList() {
    const list = document.getElementById('manageList'); list.innerHTML = '';
    userHimpunan.forEach(h => {
        const li = document.createElement('div'); li.className = 'list-card justify-content-between';
        li.innerHTML = `<div class="flex-grow-1"><div class="fw-bold text-dark" style="font-size:0.85rem;">${h.nama}</div><div class="small text-muted">${h.total} Hal</div></div>
        <div class="d-flex gap-2"><button class="btn btn-sm btn-outline-primary" onclick="window.editHimpunan('${h.id}','${h.nama.replace(/'/g,"\\'")}','${(h.topik||"").replace(/'/g,"\\'")}','${h.total}')"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger" onclick="window.deleteHimpunan('${h.id}')"><i class="bi bi-trash"></i></button></div>`;
        list.appendChild(li);
    });
  }

  window.performSearch = () => {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const cont = document.getElementById('searchResults');
    if (!q) { cont.innerHTML = '<div class="text-center text-muted mt-5 small">Cari kitab atau catatan...</div>'; return; }
    cont.innerHTML = ''; let found = false;

    const mQ = quranDb.filter(x => x.nama.toLowerCase().includes(q));
    const mH = userHimpunan.filter(x => x.nama.toLowerCase().includes(q) || (x.topik && x.topik.toLowerCase().includes(q)));
    if (mQ.length || mH.length) {
        found = true; cont.innerHTML += '<h6 class="fw-bold text-success mb-2 mt-2 small">Buku / Surat</h6>';
        mQ.forEach(x => {
            const div = document.createElement('div'); div.className = 'list-card py-2 mb-1'; div.innerHTML = `<div class="fw-bold small">${x.nama}</div><div class="ms-auto text-success small">Buka <i class="bi bi-arrow-right"></i></div>`;
            div.onclick = () => { window.switchKategori('Quran'); let s = x.start; let e = x.end; if (currentCetakan==='605'){s++;e++;} window.openGrid({nama:x.nama,start:s,end:e}); window.switchView('tracker', document.querySelectorAll('.nav-item')[1]); };
            cont.appendChild(div);
        });
        mH.forEach(x => {
            const div = document.createElement('div'); div.className = 'list-card py-2 mb-1'; div.innerHTML = `<div class="fw-bold small">${x.nama}</div><div class="ms-auto text-primary small">Buka <i class="bi bi-arrow-right"></i></div>`;
            div.onclick = () => { window.switchKategori('Himpunan'); window.openGrid(x); window.switchView('tracker', document.querySelectorAll('.nav-item')[1]); };
            cont.appendChild(div);
        });
    }

    const mLogs = userLogs.filter(x => `${x.judul} ${x.catatan} ${x.penyampai}`.toLowerCase().includes(q));
    if (mLogs.length) {
        found = true; cont.innerHTML += '<h6 class="fw-bold text-warning mb-2 mt-4 small">Isi Catatan</h6>';
        mLogs.reverse().forEach(x => {
            const card = document.createElement('div'); card.className = 'list-card flex-column align-items-start mb-2'; card.style.borderLeft = '4px solid orange';
            card.onclick = () => { activeGrid = { nama: x.judul, start: x.hal, end: x.hal }; currentKategori = x.kat; window.openNote(x.hal, x.hal, x); };
            card.innerHTML = `<div class="d-flex w-100 justify-content-between small mb-1"><span class="fw-bold">${x.judul} • Hal ${x.hal}</span><span class="text-muted">${x.tanggal}</span></div><div class="small italic text-dark">"${x.catatan}"</div>`;
            cont.appendChild(card);
        });
    }
    if (!found) cont.innerHTML = '<div class="text-center text-danger mt-5 small">Tidak ditemukan.</div>';
  };

  // --- FITUR PAMUNGKAS: EXPORT EXCEL ---
  window.exportToExcel = () => {
      if (userLogs.length === 0) return Swal.fire("Kosong", "Belum ada catatan untuk diunduh.", "info");
      
      let csv = "Tanggal,Kategori,Judul,Halaman,Penyampai,Lokasi,Catatan\n";
      userLogs.sort((a,b) => new Date(a.tanggal) - new Date(b.tanggal)).forEach(log => {
          const row = [
              log.tanggal || "",
              log.kat || "",
              `"${(log.judul || "").replace(/"/g, '""')}"`,
              log.hal || "",
              `"${(log.penyampai || "").replace(/"/g, '""')}"`,
              `"${(log.lokasi || "").replace(/"/g, '""')}"`,
              `"${(log.catatan || "").replace(/"/g, '""').replace(/\n/g, ' ')}"`
          ];
          csv += row.join(",") + "\n";
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      link.setAttribute("href", url);
      link.setAttribute("download", `Jurnal_MaknaTrack_${currentUser.email.split('@')[0]}.csv`);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      Swal.fire("Berhasil", "Laporan berhasil diunduh!", "success");
  };

  window.deleteHimpunan = async (id) => { if(confirm("Hapus data global?")) await deleteDoc(doc(db, "master_himpunan", id)); };

</script>
</body>
</html>
