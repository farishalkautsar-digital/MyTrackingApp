<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#198754">
  <title>MyTracker SaaS - BuildIt!</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root { --primary-green: #198754; --bg-light: #f4f7f6; }
    body { background-color: var(--bg-light); font-family: 'Segoe UI', sans-serif; padding-bottom: 90px; }
    
    /* UI Components */
    .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .auth-screen { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    
    /* Navigation */
    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
    .nav-item { text-align: center; color: #adb5bd; cursor: pointer; font-size: 0.75rem; font-weight: 600; flex: 1; }
    .nav-item i { font-size: 1.5rem; display: block; }
    .nav-item.active { color: var(--primary-green); }

    /* Grid & Lists */
    .list-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.03); cursor: pointer; border: 1px solid #f8f9fa; }
    .nomor-badge { background: var(--primary-green); color: white; min-width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 15px; }
    .page-btn { width: 55px; height: 55px; border-radius: 12px; border: 2px solid #e9ecef; background: white; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .page-btn.done { background: var(--primary-green); color: white; border-color: var(--primary-green); box-shadow: 0 4px 8px rgba(25, 135, 84, 0.3); }

    /* Full Screen Note */
    #fullScreenNote { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #f8f9fa; z-index: 2000; display: none; flex-direction: column; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    .view-section { display: none; padding: 20px; }
    .view-section.active { display: block; }
  </style>
</head>
<body>

<div id="authContainer" class="auth-screen">
  <div class="glass-card p-4 w-100" style="max-width: 400px;">
    <h3 class="text-center fw-bold text-success mb-4">MyTracker</h3>
    <div id="loginForm">
      <input type="email" id="emailIn" class="form-control mb-2" placeholder="Email">
      <input type="password" id="passIn" class="form-control mb-3" placeholder="Password">
      <button class="btn btn-success w-100 fw-bold mb-3" onclick="handleLogin()">Masuk</button>
      <p class="text-center small">Belum punya akun? <a href="#" onclick="toggleAuth(true)">Daftar Gratis</a></p>
    </div>
    <div id="registerForm" style="display: none;">
      <input type="text" id="nameReg" class="form-control mb-2" placeholder="Nama Lengkap">
      <input type="email" id="emailReg" class="form-control mb-2" placeholder="Email Baru">
      <input type="password" id="passReg" class="form-control mb-3" placeholder="Password (min 6 karakter)">
      <button class="btn btn-primary w-100 fw-bold mb-3" onclick="handleRegister()">Buat Akun</button>
      <p class="text-center small">Sudah punya akun? <a href="#" onclick="toggleAuth(false)">Login</a></p>
    </div>
  </div>
</div>

<div id="mainApp" style="display: none;">
  <div id="view-dashboard" class="view-section active">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold m-0">Dashboard</h4>
        <button class="btn btn-sm btn-outline-danger" onclick="handleLogout()"><i class="bi bi-box-arrow-right"></i></button>
    </div>
    <div id="dashboardStats">
        </div>
  </div>

  <div id="view-tracker" class="view-section">
    <div class="btn-group w-100 mb-4 shadow-sm" style="border-radius: 15px; overflow: hidden;">
        <button id="btnKatQuran" class="btn btn-success active" onclick="switchKategori('Quran')">Al-Qur'an</button>
        <button id="btnKatHimpunan" class="btn btn-light" onclick="switchKategori('Himpunan')">Himpunan</button>
    </div>
    <div id="quranOptions" class="mb-3 d-flex justify-content-end align-items-center">
        <label class="small text-muted fw-bold me-2">Cetakan:</label>
        <select id="selectCetakan" class="form-select form-select-sm w-auto shadow-sm" onchange="changeCetakan(this.value)">
            <option value="605">605 Halaman</option>
            <option value="604">604 Halaman</option>
        </select>
    </div>
    <div id="masterList"></div>
    <div id="detailGrid" style="display: none;">
        <button class="btn btn-light mb-3 fw-bold" onclick="closeGrid()"><i class="bi bi-arrow-left"></i> Kembali</button>
        <h5 id="gridTitle" class="fw-bold text-success mb-3"></h5>
        <div class="d-flex flex-wrap gap-2 justify-content-center" id="gridContainer"></div>
    </div>
  </div>

  <div id="view-manage" class="view-section">
    <h4 class="fw-bold mb-4">Kelola Himpunan</h4>
    <div class="glass-card p-3 mb-4">
        <input type="text" id="himpNama" class="form-control mb-2" placeholder="Nama Himpunan">
        <input type="text" id="himpTopik" class="form-control mb-2" placeholder="Topik">
        <input type="number" id="himpTotal" class="form-control mb-3" placeholder="Total Halaman">
        <button class="btn btn-success w-100 fw-bold" onclick="addHimpunan()">Tambah Himpunan Personal</button>
    </div>
    <div id="manageList"></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchView('dashboard', this)"><i class="bi bi-house-door"></i>Home</div>
    <div class="nav-item" onclick="switchView('tracker', this)"><i class="bi bi-card-checklist"></i>Track</div>
    <div class="nav-item" onclick="switchView('manage', this)"><i class="bi bi-gear"></i>Kelola</div>
  </div>
</div>

<div id="fullScreenNote">
    <div class="p-3 bg-success text-white d-flex justify-content-between align-items-center">
        <button class="btn btn-sm btn-light" onclick="closeNote()">Batal</button>
        <span id="noteHeader" class="fw-bold">Halaman X</span>
        <button class="btn btn-sm btn-warning fw-bold" onclick="saveNote()">Simpan</button>
    </div>
    <div class="p-3 flex-grow-1 overflow-auto">
        <input type="text" id="notePenyampai" class="form-control mb-2" placeholder="Penyampai">
        <input type="date" id="noteTanggal" class="form-control mb-2">
        <input type="text" id="noteLokasi" class="form-control mb-3" placeholder="Lokasi">
        <textarea id="noteCatatan" class="form-control" style="height: 300px;" placeholder="Tulis makna/keterangan..."></textarea>
        <button id="btnDeleteLog" class="btn btn-outline-danger w-100 mt-4" onclick="deleteNote()">Hapus Progres Halaman Ini</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, addDoc, deleteDoc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDdRszwvHi8U5YJbrwso1B_1BpNvfoznUU",
    authDomain: "my-tracker-app-90c55.firebaseapp.com",
    projectId: "my-tracker-app-90c55",
    storageBucket: "my-tracker-app-90c55.firebasestorage.app",
    messagingSenderId: "837338808376",
    appId: "1:837338808376:web:43d048253c540f8c46a6cd"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let userLogs = [];
  let userHimpunan = [];
  let currentKategori = 'Quran';
  let activeGrid = null;

  const quranDb = [
    { no: 1, nama: "Al-Fatihah", start: 1, end: 2 },
    { no: 2, nama: "Al-Baqarah", start: 3, end: 50 },
    { no: 3, nama: "Ali 'Imran", start: 51, end: 77 },
    { no: 4, nama: "An-Nisa'", start: 78, end: 107 },
    { no: 5, nama: "Al-Maidah", start: 107, end: 127 }
  ];

  // --- AUTH LOGIC ---
  window.toggleAuth = (isReg) => {
    document.getElementById('loginForm').style.display = isReg ? 'none' : 'block';
    document.getElementById('registerForm').style.display = isReg ? 'block' : 'none';
  };

  window.handleRegister = async () => {
    const name = document.getElementById('nameReg').value;
    const email = document.getElementById('emailReg').value;
    const pass = document.getElementById('passReg').value;
    try {
      const res = await createUserWithEmailAndPassword(auth, email, pass);
      await setDoc(doc(db, "users", res.user.uid), { nama: name, email: email, createdAt: new Date() });
      Swal.fire("Berhasil", "Akun dibuat!", "success");
    } catch (e) { Swal.fire("Error", e.message, "error"); }
  };

  window.handleLogin = async () => {
    const email = document.getElementById('emailIn').value;
    const pass = document.getElementById('passIn').value;
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) { Swal.fire("Gagal", "Email/Password salah", "error"); }
  };

  window.handleLogout = () => signOut(auth);

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      document.getElementById('authContainer').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      initDataListener();
    } else {
      document.getElementById('authContainer').style.display = 'flex';
      document.getElementById('mainApp').style.display = 'none';
    }
  });

  // --- DATA LISTENER (REALTIME) ---
  function initDataListener() {
    // Listen Logs
    const qLogs = query(collection(db, "log_progres"), where("uid", "==", currentUser.uid));
    onSnapshot(qLogs, (snap) => {
      userLogs = snap.docs.map(d => ({id: d.id, ...d.data()}));
      renderDashboard();
      if(activeGrid) renderGrid();
    });

    // Listen Himpunan
    const qHimp = query(collection(db, "master_himpunan"), where("uid", "==", currentUser.uid));
    onSnapshot(qHimp, (snap) => {
      userHimpunan = snap.docs.map(d => ({id: d.id, ...d.data()}));
      renderMasterList();
      renderManageList();
    });
  }

  // --- UI LOGIC ---
  window.switchView = (viewId, el) => {
    document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('view-' + viewId).classList.add('active');
    el.classList.add('active');
    if(viewId === 'tracker') { closeGrid(); renderMasterList(); }
  };

  window.switchKategori = (kat) => {
    currentKategori = kat;
    document.getElementById('btnKatQuran').className = kat === 'Quran' ? 'btn btn-success active' : 'btn btn-light';
    document.getElementById('btnKatHimpunan').className = kat === 'Himpunan' ? 'btn btn-success active' : 'btn btn-light';
    renderMasterList();
  };

  // Variabel penyimpan pilihan cetakan (diingat oleh HP user)
  let currentCetakan = localStorage.getItem('cetakanQuran') || '605';

  // Fungsi saat user mengubah cetakan
  window.changeCetakan = (val) => {
    currentCetakan = val;
    localStorage.setItem('cetakanQuran', val);
    renderMasterList(); // Render ulang daftar secara instan
  };

  window.switchKategori = (kat) => {
    currentKategori = kat;
    document.getElementById('btnKatQuran').className = kat === 'Quran' ? 'btn btn-success active' : 'btn btn-light';
    document.getElementById('btnKatHimpunan').className = kat === 'Himpunan' ? 'btn btn-success active' : 'btn btn-light';
    
    // Sembunyikan dropdown cetakan kalau lagi di menu Himpunan
    document.getElementById('quranOptions').style.display = kat === 'Quran' ? 'flex' : 'none';
    
    // Pastikan dropdown menampilkan nilai yang tersimpan
    document.getElementById('selectCetakan').value = currentCetakan;
    renderMasterList();
  };

  function renderMasterList() {
    const list = document.getElementById('masterList');
    list.innerHTML = '';
    
    if (currentKategori === 'Quran') {
      quranDb.forEach(q => {
        let s = q.start;
        let e = q.end;

        // LOGIKA CETAKAN 604 HALAMAN MAS FARISH
        if (currentCetakan === '604') {
          // Khusus Al-Fatihah biasanya tetap di Hal 1
          if (q.no === 1) { 
             s = 1; e = 1; 
          } else {
             s = q.start + 1;
             e = q.end - 1;
             // Safety Check untuk surat pendek agar tidak error
             if (s > e) {
               s = q.start - 1; // Mundur 1 halaman
               e = q.end - 1;
               if (s < 1) s = 1; // Cegah minus
             }
          }
        }

        const card = document.createElement('div');
        card.className = 'list-card';
        card.innerHTML = `<div class="nomor-badge">${q.no}</div><div><div class="fw-bold">${q.nama}</div><div class="small text-muted">Halaman ${s} - ${e}</div></div>`;
        
        // Kirim data start & end yang sudah disesuaikan ke fungsi Grid
        card.onclick = () => openGrid({ nama: q.nama, start: s, end: e, total: e });
        list.appendChild(card);
      });
    } else {
      userHimpunan.forEach((h, index) => {
        const card = document.createElement('div');
        card.className = 'list-card';
        card.innerHTML = `<div class="nomor-badge">${index + 1}</div><div><div class="fw-bold">${h.nama}</div><div class="small text-muted">${h.topik} • ${h.total} Hal</div></div>`;
        card.onclick = () => openGrid(h);
        list.appendChild(card);
      });
    }
  }

  window.openGrid = (item) => {
    activeGrid = item;
    document.getElementById('masterList').style.display = 'none';
    document.getElementById('detailGrid').style.display = 'block';
    document.getElementById('gridTitle').innerText = item.nama;
    renderGrid();
  };

  window.closeGrid = () => {
    activeGrid = null;
    document.getElementById('masterList').style.display = 'block';
    document.getElementById('detailGrid').style.display = 'none';
  };

  function renderGrid() {
    const container = document.getElementById('gridContainer');
    container.innerHTML = '';
    const start = currentKategori === 'Quran' ? activeGrid.start : 1;
    const end = currentKategori === 'Quran' ? activeGrid.end : activeGrid.total;

    for (let i = start; i <= end; i++) {
      const log = userLogs.find(l => l.kat === currentKategori && l.judul === activeGrid.nama && l.hal == i);
      const btn = document.createElement('div');
      btn.className = `page-btn ${log ? 'done' : ''}`;
      btn.innerText = i;
      btn.onclick = () => openNote(i, log);
      container.appendChild(btn);
    }
  }

  // --- NOTE LOGIC ---
  let activePage = null;
  window.openNote = (hal, log) => {
    activePage = { hal, logId: log ? log.id : null };
    document.getElementById('noteHeader').innerText = `Hal ${hal}`;
    document.getElementById('notePenyampai').value = log ? log.penyampai : '';
    document.getElementById('noteTanggal').value = log ? log.tanggal : new Date().toISOString().split('T')[0];
    document.getElementById('noteLokasi').value = log ? log.lokasi : '';
    document.getElementById('noteCatatan').value = log ? log.catatan : '';
    document.getElementById('btnDeleteLog').style.display = log ? 'block' : 'none';
    document.getElementById('fullScreenNote').style.display = 'flex';
  };

  window.closeNote = () => document.getElementById('fullScreenNote').style.display = 'none';

  window.saveNote = async () => {
    const data = {
      uid: currentUser.uid,
      kat: currentKategori,
      judul: activeGrid.nama,
      hal: activePage.hal,
      penyampai: document.getElementById('notePenyampai').value,
      tanggal: document.getElementById('noteTanggal').value,
      lokasi: document.getElementById('noteLokasi').value,
      catatan: document.getElementById('noteCatatan').value,
      updatedAt: new Date()
    };
    
    try {
      if(activePage.logId) {
        await updateDoc(doc(db, "log_progres", activePage.logId), data);
      } else {
        await addDoc(collection(db, "log_progres"), data);
      }
      closeNote();
    } catch (e) { alert(e.message); }
  };

  window.deleteNote = async () => {
    if(confirm("Hapus progres halaman ini?")) {
        await deleteDoc(doc(db, "log_progres", activePage.logId));
        closeNote();
    }
  };

  // --- MANAGE & DASHBOARD ---
  window.addHimpunan = async () => {
    const nama = document.getElementById('himpNama').value;
    const topik = document.getElementById('himpTopik').value;
    const total = document.getElementById('himpTotal').value;
    if(!nama || !total) return;
    await addDoc(collection(db, "master_himpunan"), { uid: currentUser.uid, nama, topik, total: parseInt(total) });
    document.getElementById('himpNama').value = '';
  };

  function renderDashboard() {
    const cont = document.getElementById('dashboardStats');
    cont.innerHTML = '';
    
    // Quran Progress
    const qDone = userLogs.filter(l => l.kat === 'Quran').length;
    const qPerc = Math.round((qDone / 604) * 100);
    cont.innerHTML += `<div class="glass-card p-3 mb-3 border-start border-4 border-success">
        <h6 class="fw-bold text-success">Al-Qur'an</h6>
        <div class="progress mb-1" style="height:15px"><div class="progress-bar bg-success" style="width:${qPerc}%"></div></div>
        <small class="text-muted">${qDone}/604 Halaman (${qPerc}%)</small>
    </div>`;

    // Himpunan Progress
    userHimpunan.forEach(h => {
        const hDone = userLogs.filter(l => l.kat === 'Himpunan' && l.judul === h.nama).length;
        const hPerc = Math.round((hDone / h.total) * 100);
        cont.innerHTML += `<div class="glass-card p-3 mb-3 border-start border-4 border-primary">
            <h6 class="fw-bold text-primary">${h.nama}</h6>
            <div class="progress mb-1" style="height:15px"><div class="progress-bar bg-primary" style="width:${hPerc}%"></div></div>
            <small class="text-muted">${hDone}/${h.total} Halaman (${hPerc}%)</small>
        </div>`;
    });
  }

  function renderManageList() {
    const list = document.getElementById('manageList');
    list.innerHTML = '';
    userHimpunan.forEach(h => {
        const li = document.createElement('div');
        li.className = 'list-card justify-content-between';
        li.innerHTML = `<div><div class="fw-bold">${h.nama}</div><div class="small text-muted">${h.total} Hal</div></div>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteHimpunan('${h.id}')"><i class="bi bi-trash"></i></button>`;
        list.appendChild(li);
    });
  }

  window.deleteHimpunan = async (id) => {
    if(confirm("Hapus himpunan ini?")) await deleteDoc(doc(db, "master_himpunan", id));
  };

</script>
</body>
</html>
